version: 2.1
jobs:
  opentofu_test:
    docker:
      - image: ghcr.io/opentofu/opentofu:1.8.0
    steps:
      - checkout
      - run:
          name: Initialize opentofu
          command: tofu init
      - run:
          name: Run tests
          command: tofu test

  opentofu_plan:
    docker:
      - image: ghcr.io/opentofu/opentofu:1.8.0
    steps:
      - checkout
      - run:
          name: Initialize opentofu
          command: tofu init
      - run:
          name: opentofu Plan
          command: tofu plan

  opentofu_apply:
    docker:
      - image: ghcr.io/opentofu/opentofu:1.8.0
    steps:
      - checkout
      - run:
          name: Initialize opentofu
          command: tofu init
      - run:
          name: opentofu Apply
          command: tofu apply -auto-approve

  opentofu_destroy:
    docker:
      - image: ghcr.io/opentofu/opentofu:1.8.0
    steps:
      - checkout
      - run:
          name: Initialize opentofu
          command: tofu init
      - run:
          name: opentofu Destroy
          command: tofu destroy -auto-approve

workflows:
  build_and_deploy:
    jobs:
      - opentofu_test
      - opentofu_plan:
          requires:
            - opentofu_test
      - opentofu_apply:
          requires:
            - opentofu_plan
      - approve_destroy:
          type: approval
          requires:
            - opentofu_apply
      - opentofu_destroy:
          requires:
            - approve_destroy
